<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#2b5cff" media="(prefers-color-scheme: light)" />
  <meta name="theme-color" content="#1d3fb8" media="(prefers-color-scheme: dark)" />
  <meta name="description" content="火山引擎售前工程师 20 天深度学习 · 含面试培训与华为对位竞品分析 · 离线可用" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="火山售前学习" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="format-detection" content="telephone=no" />

  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png" />
  <link rel="icon" type="image/png" sizes="512x512" href="icons/icon-512.png" />
  <link rel="apple-touch-icon" sizes="180x180" href="icons/icon-180.png" />
  <link rel="apple-touch-icon" sizes="192x192" href="icons/icon-192.png" />

  <title>火山引擎售前工程师 · 20天深度学习平台</title>
  <link rel="stylesheet" href="styles/main.css?v=14" />
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <span class="logo">VE</span>
      <div>
        <h1>火山引擎售前工程师 · 20天深度版</h1>
        <p class="subtitle">Cloud · AI · Solution · 每天 90-120 分钟，由浅入深直达合格</p>
      </div>
    </div>
    <nav class="topnav" id="topnav">
      <button class="nav-btn active" data-view="dashboard"><span class="nav-ic">🏠</span><span class="nav-tx">学习仪表盘</span></button>
      <button class="nav-btn" data-view="curriculum"><span class="nav-ic">📚</span><span class="nav-tx">课程目录</span></button>
      <button class="nav-btn" data-view="interview"><span class="nav-ic">🎯</span><span class="nav-tx">面试培训</span></button>
      <button class="nav-btn" data-view="competition"><span class="nav-ic">⚔️</span><span class="nav-tx">竞品分析</span></button>
      <button class="nav-btn" data-view="exam"><span class="nav-ic">📝</span><span class="nav-tx">综合考试</span></button>
      <button class="nav-btn" data-view="about"><span class="nav-ic">💡</span><span class="nav-tx">学习指南</span></button>
    </nav>
  </header>

  <main id="app"></main>

  <!-- 智能问答浮动按钮 -->
  <button id="aiFab" class="ai-fab" type="button" aria-label="打开学习助手" title="对内容有疑问？问我">
    <span class="ai-fab-icon">💬</span>
  </button>

  <!-- 智能问答聊天面板 -->
  <div id="aiPanel" class="ai-panel" hidden>
    <div class="ai-panel-card">
      <header class="ai-header">
        <div class="ai-title-wrap">
          <span class="ai-title">📚 学习助手</span>
          <span class="ai-context-label" id="aiContextLabel">…</span>
        </div>
        <button class="ai-icon-btn" id="aiSettingsBtn" type="button" title="AI 服务设置">⚙</button>
        <button class="ai-icon-btn" type="button" title="关闭" onclick="var p=document.getElementById('aiPanel');p.hidden=true;p.style.display='none';">×</button>
      </header>
      <div class="ai-messages" id="aiMessages"></div>
      <div class="ai-input-row">
        <button class="ai-context-btn" id="aiContextBtn" type="button" title="附加当前章节内容到提问">📎</button>
        <textarea id="aiInput" rows="1" placeholder="问点什么？例如：豆包 Pro 和 DeepSeek 怎么对比？" autocomplete="off"></textarea>
        <button class="ai-send-btn" id="aiSendBtn" type="button">发送</button>
      </div>
    </div>
  </div>

  <!-- AI 服务设置面板 -->
  <div id="aiSettings" class="ai-settings" hidden>
    <div class="ai-settings-card">
      <header class="ai-header">
        <span class="ai-title">⚙ AI 服务设置</span>
        <button class="ai-icon-btn" type="button" title="关闭" onclick="var s=document.getElementById('aiSettings');s.hidden=true;s.style.display='none';">×</button>
      </header>
      <div class="ai-settings-body">
        <p class="ai-help-tip">🔒 配置只保存在你本地浏览器，<b>不会上传任何服务器</b>。</p>

        <label>选择服务</label>
        <select id="aiPreset">
          <option value="ark">火山方舟 / 豆包（国内推荐）</option>
          <option value="deepseek">DeepSeek（性价比高）</option>
          <option value="qwen">通义千问（阿里）</option>
          <option value="custom">自定义（OpenAI 兼容）</option>
        </select>

        <label>API Endpoint</label>
        <input id="aiEndpoint" type="url" placeholder="https://...">

        <label>API Key (Bearer Token)</label>
        <input id="aiKey" type="password" autocomplete="off" placeholder="sk-... / ep-... / 等">

        <label>Model 或 Endpoint ID</label>
        <input id="aiModel" type="text" placeholder="如 deepseek-chat / ep-2024xxxxx">

        <p class="ai-help-links">
          申请 API Key：<br>
          • <a href="https://console.volcengine.com/ark/region:ark+cn-beijing/apiKey" target="_blank" rel="noopener">火山方舟控制台</a><br>
          • <a href="https://platform.deepseek.com/api_keys" target="_blank" rel="noopener">DeepSeek 平台</a><br>
          • <a href="https://bailian.console.aliyun.com/" target="_blank" rel="noopener">通义千问百炼</a>
        </p>

        <div class="ai-settings-actions">
          <button class="ai-test-btn" id="aiTestBtn" type="button">测试连接</button>
          <button class="ai-save-btn" id="aiSaveBtn" type="button">保存</button>
        </div>
        <div class="ai-test-result" id="aiTestResult"></div>
      </div>
    </div>
  </div>

  <footer class="footer">
    <span>© 学习平台 · 数据保存在你本地浏览器，关闭页面不会丢失</span>
    <button id="resetBtn" class="link-btn">重置全部进度</button>
  </footer>

  <script src="scripts/data.js?v=14"></script>
  <script src="scripts/quiz-data.js?v=14"></script>
  <script src="scripts/competition-data.js?v=14"></script>
  <script src="scripts/glossary.js?v=14"></script>
  <script src="scripts/app.js?v=14"></script>
  <script src="scripts/ai-chat.js?v=14"></script>
  <script>
    // 注册 Service Worker（PWA 离线缓存）
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js').then((reg) => {
          // 检测到新版本时静默更新
          reg.addEventListener('updatefound', () => {
            const sw = reg.installing;
            if (!sw) return;
            sw.addEventListener('statechange', () => {
              if (sw.state === 'installed' && navigator.serviceWorker.controller) {
                // 后台已下载新版，下次启动生效
                console.info('[PWA] 已下载新版本，下次启动应用');
              }
            });
          });
        }).catch((err) => {
          console.warn('[PWA] Service Worker 注册失败：', err);
        });
      });
    }
  </script>
</body>
</html>
