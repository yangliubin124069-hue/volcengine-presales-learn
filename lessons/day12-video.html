<style>
  /* Day 12 专用动画样式 */

  /* AI 嵌套圆（Venn） */
  .ml-venn { width: 380px; height: 320px; position: relative; }
  .ml-venn .circle {
    position: absolute; left: 50%; transform: translateX(-50%);
    border: 2px solid; border-radius: 50%; display: flex; align-items: center;
    justify-content: center; flex-direction: column;
    transition: all .4s; animation: vennIn .6s both;
    background: radial-gradient(circle at 30% 30%, rgba(255,255,255,.08), transparent);
  }
  .ml-venn .c1 { width: 320px; height: 320px; top: 0; border-color: #2b5cff;
    background: radial-gradient(circle at 30% 30%, rgba(43,92,255,.15), rgba(43,92,255,.03)); animation-delay: .2s; }
  .ml-venn .c2 { width: 220px; height: 220px; top: 50px; border-color: #6e3aff;
    background: radial-gradient(circle at 30% 30%, rgba(110,58,255,.18), rgba(110,58,255,.04)); animation-delay: .5s; }
  .ml-venn .c3 { width: 140px; height: 140px; top: 90px; border-color: #ec4899;

  .ml-venn .c4 { width: 70px; height: 70px; top: 125px; border-color: #f59e0b;
    background: radial-gradient(circle at 30% 30%, rgba(245,158,11,.25), rgba(245,158,11,.08)); animation-delay: 1.1s; }
  .ml-venn .lbl {
    position: absolute; font-size: 13px; font-weight: 700;
    background: #0b1020; padding: 2px 8px; border-radius: 4px;
    animation: fadeIn .5s both;
  }
  .ml-venn .l1 { color: #a5b4fc; top: 4px; animation-delay: .3s; }
  .ml-venn .l2 { color: #c4b5fd; top: 50px; animation-delay: .6s; }
  .ml-venn .l3 { color: #f9a8d4; top: 90px; animation-delay: .9s; }
  .ml-venn .l4 { color: #fde68a; top: 130px; animation-delay: 1.2s; font-size: 11.5px; }
  @keyframes vennIn { from { opacity: 0; transform: translateX(-50%) scale(.5); } to { opacity: 1; transform: translateX(-50%) scale(1); } }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

  /* 训练流程管道 */
  .pipeline-vis {
    display: flex; align-items: center; justify-content: center; flex-wrap: wrap; gap: 6px;
    width: 880px; max-width: 96vw; padding: 16px; background: rgba(255,255,255,.04);
    border-radius: 12px; border: 1px solid rgba(255,255,255,.1);

  .pipe-step {
    padding: 10px 14px; border-radius: 8px; font-size: 12.5px; min-width: 95px;
    text-align: center; animation: cardIn .5s both; position: relative;
  }
  .pipe-step.s1 { background: rgba(43,92,255,.2); border: 1px solid #2b5cff; animation-delay: .1s; }
  .pipe-step.s2 { background: rgba(110,58,255,.2); border: 1px solid #6e3aff; animation-delay: .25s; }
  .pipe-step.s3 { background: rgba(236,72,153,.2); border: 1px solid #ec4899; animation-delay: .4s; }
  .pipe-step.s4 { background: rgba(245,158,11,.2); border: 1px solid #f59e0b; animation-delay: .55s; }
  .pipe-step.s5 { background: rgba(34,197,94,.2); border: 1px solid #22c55e; animation-delay: .7s; }
  .pipe-step .ic { font-size: 22px; display: block; margin-bottom: 4px; }
  .pipe-arrow { color: #7a8db5; font-size: 18px; animation: arrowSlide 1.5s ease-in-out infinite; }

  /* 过拟合曲线 */
  .curves-svg { width: 540px; max-width: 92vw; }

  /* CNN 管道 */
  .cnn-pipe { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; justify-content: center; }
  .cnn-block { display: flex; flex-direction: column; gap: 3px; padding: 10px;
    background: rgba(255,255,255,.04); border-radius: 8px; border: 1px solid rgba(255,255,255,.1);
    animation: cardIn .5s both; }
  .cnn-block:nth-child(1) { animation-delay: .1s; }
  .cnn-block:nth-child(3) { animation-delay: .3s; }
  .cnn-block:nth-child(5) { animation-delay: .5s; }
  .cnn-block:nth-child(7) { animation-delay: .7s; }
  .cnn-block .name { font-size: 11px; color: #a5b4fc; letter-spacing: 1px; text-align: center; }
  .cnn-grid { display: grid; gap: 2px; }
  .cnn-cell { width: 8px; height: 8px; background: rgba(43,92,255,.4); border-radius: 1px;
    animation: cnnPulse 2s ease-in-out infinite; }
  @keyframes cnnPulse { 0%,100%{background:rgba(43,92,255,.4)} 50%{background:rgba(43,92,255,.9)} }
  .cnn-arrow { color: #7a8db5; font-size: 20px; }

  /* Self-Attention 网格 */
  .attn-grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 4px;
    width: 360px; padding: 16px; background: rgba(255,255,255,.04);
    border-radius: 10px; border: 1px solid rgba(255,255,255,.1); }
  .attn-cell { aspect-ratio: 1; background: rgba(43,92,255,.2); border-radius: 3px;

  @keyframes attnPulse {

    50% { box-shadow: 0 0 8px rgba(165,180,252,.6); transform: scale(1.05); }
  }

  .gpu-grid {
    display: grid; grid-template-columns: repeat(8, 1fr); gap: 4px;
    width: 380px; padding: 16px; background: rgba(255,255,255,.04);
    border-radius: 10px; border: 1px solid rgba(255,255,255,.1);
  }

    border-radius: 4px; animation: gpuBlink 1.8s ease-in-out infinite; }
  @keyframes gpuBlink {
    0%, 60%, 100% { background: rgba(236,72,153,.3); box-shadow: none; }
    75% { background: #ec4899; box-shadow: 0 0 10px #ec4899, 0 0 20px rgba(236,72,153,.6); }
  }
</style>
